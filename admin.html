<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Dashboard admin Suaimi Livestock.">
	<meta name="theme-color" content="#9c4f2f">
	<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
	<meta http-equiv="Pragma" content="no-cache">
	<title>Dashboard Admin - Suaimi Livestock</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700;9..144,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
	<style>
		:root {
			--background: #f6f1e9;
			--surface: #fffaf0;
			--foreground: #18130f;
			--primary: #9c4f2f;
			--primary-dark: #6f3420;
			--muted-foreground: #6b6258;
			--border: rgba(24, 19, 15, 0.14);
		}

		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: "Hanken Grotesk", Arial, sans-serif;
			color: var(--foreground);
			background:
				radial-gradient(circle at 12% 8%, rgba(156, 79, 47, 0.16), transparent 32%),
				radial-gradient(circle at 95% 90%, rgba(111, 52, 32, 0.14), transparent 38%),
				var(--background);
		}

		a { color: inherit; text-decoration: none; }
		.container { width: min(1180px, calc(100% - 48px)); margin: 0 auto; }

		.navbar {
			position: sticky;
			top: 0;
			z-index: 40;
			background: rgba(246, 241, 233, .92);
			border-bottom: 1px solid var(--border);
			backdrop-filter: blur(12px);
		}

		.nav-inner {
			height: 76px;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 24px;
		}

		.brand {
			font-family: "Fraunces", Georgia, serif;
			font-size: 28px;
			font-weight: 800;
		}

		.brand span { color: var(--primary); }

		.nav-actions {
			display: inline-flex;
			align-items: center;
			gap: 10px;
		}

		.btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 10px 16px;
			font-size: 13px;
			font-weight: 800;
			letter-spacing: .04em;
			text-transform: uppercase;
			border-radius: 2px;
			border: 1px solid var(--primary);
			background: var(--primary);
			color: var(--surface);
			cursor: pointer;
			transition: background .2s ease, border-color .2s ease;
		}

		.btn:hover { background: var(--primary-dark); border-color: var(--primary-dark); }

		.btn-ghost {
			background: transparent;
			color: var(--primary);
		}

		.main {
			padding: 64px 0 80px;
		}

		.panel {
			border: 1px solid var(--border);
			background: rgba(255, 250, 240, .72);
			padding: 34px;
		}

		.eyebrow {
			margin: 0 0 14px;
			color: var(--primary);
			font-size: 12px;
			font-weight: 800;
			letter-spacing: .32em;
			text-transform: uppercase;
		}

		h1 {
			margin: 0;
			font-family: "Fraunces", Georgia, serif;
			font-size: clamp(34px, 4vw, 58px);
			line-height: .98;
		}

		.subtitle {
			margin: 14px 0 0;
			font-size: 17px;
			line-height: 1.7;
			color: var(--muted-foreground);
			max-width: 760px;
		}

		.build-badge {
			display: inline-block;
			margin-top: 12px;
			padding: 6px 10px;
			font-size: 12px;
			font-weight: 800;
			letter-spacing: .06em;
			text-transform: uppercase;
			color: #fff;
			background: #2e6b3f;
			border-radius: 2px;
		}

		.grid {
			margin-top: 26px;
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 16px;
		}

		.card {
			border: 1px solid var(--border);
			background: var(--surface);
			padding: 20px;
		}

		.card h2 {
			margin: 0 0 6px;
			font-family: "Fraunces", Georgia, serif;
			font-size: 28px;
		}

		.card p {
			margin: 0;
			color: var(--muted-foreground);
			line-height: 1.6;
		}

		.user-info {
			margin-top: 24px;
			font-size: 14px;
			color: var(--muted-foreground);
		}

		.dashboard-grid {
			margin-top: 30px;
			display: grid;
			grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
			gap: 18px;
		}

		.management-box {
			border: 1px solid var(--border);
			background: var(--surface);
			padding: 20px;
		}

		.management-box h2 {
			margin: 0 0 16px;
			font-family: "Fraunces", Georgia, serif;
			font-size: 30px;
		}

		.form-grid {
			display: grid;
			gap: 12px;
		}

		.field {
			display: grid;
			gap: 6px;
		}

		.field label {
			font-size: 12px;
			font-weight: 700;
			letter-spacing: .04em;
			text-transform: uppercase;
			color: var(--muted-foreground);
		}

		.field input,
		.field select,
		.field textarea {
			height: 42px;
			padding: 0 12px;
			border: 1px solid var(--border);
			background: #fff;
			color: var(--foreground);
		}

		.field textarea {
			height: auto;
			min-height: 96px;
			padding: 12px;
			resize: vertical;
			font: inherit;
		}

		.form-row {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 10px;
		}

		.form-actions {
			display: flex;
			gap: 8px;
			margin-top: 4px;
		}

		.btn-danger {
			border-color: #9f2f2f;
			background: #9f2f2f;
		}

		.btn-danger:hover {
			border-color: #7d2424;
			background: #7d2424;
		}

		.status-text {
			min-height: 20px;
			margin-top: 10px;
			font-size: 14px;
			color: var(--muted-foreground);
		}

		.status-text.error { color: #9f2f2f; }
		.status-text.success { color: #2e6b3f; }

		.reauth-wrap {
			margin-top: 10px;
			display: none;
		}

		.table-wrap {
			overflow-x: auto;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			font-size: 14px;
		}

		thead th {
			text-align: left;
			padding: 10px 8px;
			border-bottom: 1px solid var(--border);
			color: var(--muted-foreground);
			font-size: 12px;
			letter-spacing: .04em;
			text-transform: uppercase;
		}

		tbody td {
			padding: 11px 8px;
			border-bottom: 1px solid var(--border);
			vertical-align: top;
		}

		.action-buttons {
			display: inline-flex;
			gap: 6px;
		}

		.btn-sm {
			padding: 6px 10px;
			font-size: 11px;
		}

		.user-info.error { color: #9f2f2f; }

		@media (max-width: 900px) {
			.grid { grid-template-columns: 1fr; }
			.dashboard-grid { grid-template-columns: 1fr; }
			.form-row { grid-template-columns: 1fr; }
			.panel { padding: 24px; }
		}
	</style>
</head>
<body>
	<nav class="navbar">
		<div class="container nav-inner">
			<a href="./index.html" class="brand">suaimi<span>.</span></a>
			<div class="nav-actions">
				<a href="./katalog.html" class="btn btn-ghost">Katalog</a>
				<button type="button" class="btn" id="logout-button">Logout</button>
			</div>
		</div>
	</nav>

	<main class="main">
		<section class="container panel" aria-label="Dashboard admin">
			<p class="eyebrow">Area Terproteksi</p>
			<h1>Dashboard Admin</h1>
			<p class="build-badge" id="build-badge">Build checking...</p>
			<p class="subtitle">Kelola katalog sapi langsung dari dashboard. Data tersimpan ke backend Supabase.</p>
			<div class="dashboard-grid">
				<section class="management-box" aria-label="Form data sapi">
					<h2>Form Sapi</h2>
					<form id="cattle-form" class="form-grid">
						<input type="hidden" id="cattle-id">
						<div class="field">
							<label for="code">Kode</label>
							<input id="code" name="code" type="text" placeholder="SP-010" required>
						</div>
						<div class="field">
							<label for="name">Nama</label>
							<input id="name" name="name" type="text" placeholder="Sapi Bali Jantan" required>
						</div>
						<div class="field">
							<label for="breed">Ras</label>
							<input id="breed" name="breed" type="text" placeholder="Sapi Bali" required>
						</div>
						<div class="form-row">
							<div class="field">
								<label for="gender">Kelamin</label>
								<select id="gender" name="gender" required>
									<option value="Jantan">Jantan</option>
									<option value="Betina">Betina</option>
								</select>
							</div>
							<div class="field">
								<label for="status">Status</label>
								<select id="status" name="status" required>
									<option value="Tersedia">Tersedia</option>
									<option value="Terjual">Terjual</option>
									<option value="Booking">Booking</option>
								</select>
							</div>
						</div>
						<div class="form-row">
							<div class="field">
								<label for="weightKg">Berat (kg)</label>
								<input id="weightKg" name="weightKg" type="number" min="1" required>
							</div>
							<div class="field">
								<label for="price">Harga</label>
								<input id="price" name="price" type="number" min="1" required>
							</div>
						</div>
						<div class="field">
							<label for="imageUrl">URL Gambar</label>
							<input id="imageUrl" name="imageUrl" type="text" placeholder="image/sapi10.jpg">
						</div>
						<div class="field">
							<label for="healthCondition">Kondisi Kesehatan</label>
							<textarea id="healthCondition" name="healthCondition" placeholder="Contoh: sehat, aktif, nafsu makan baik, bulu bersih, kaki normal."></textarea>
						</div>
						<div class="form-actions">
							<button type="submit" class="btn" id="save-button">Simpan</button>
							<button type="button" class="btn btn-ghost" id="reset-button">Reset</button>
						</div>
					</form>
					<p class="status-text" id="form-status"></p>
				</section>

				<section class="management-box" aria-label="Tabel katalog sapi">
					<h2>Data Katalog</h2>
					<div class="table-wrap">
						<table>
							<thead>
								<tr>
									<th>Kode</th>
									<th>Nama</th>
									<th>Ras</th>
									<th>Berat</th>
									<th>Harga</th>
									<th>Status</th>
									<th>Aksi</th>
								</tr>
							</thead>
							<tbody id="cattle-tbody"></tbody>
						</table>
					</div>
				</section>
			</div>
			<p class="user-info" id="user-info">Memuat data akun...</p>
			<div class="reauth-wrap" id="reauth-wrap">
				<a class="btn" href="./login.html?state=reauth_required">Login Ulang</a>
			</div>
		</section>
	</main>

	<script src="./auth-config.js"></script>
	<script src="./supabase.min.js"></script>
	<script>
	const SUPABASE_URL = window.AUTH_CONFIG?.SUPABASE_URL || 'https://etgnnyigpmmsbwppymsm.supabase.co';
	const SUPABASE_ANON_KEY = window.AUTH_CONFIG?.SUPABASE_ANON_KEY || 'sb_publishable_XJfL6VDZxULEmsHUKm8xkQ_t4GAY6HH';
	const CATTLE_TABLE = window.AUTH_CONFIG?.SUPABASE_CATTLE_TABLE || 'cattle';
	const supabaseClient = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase?.createClient)
		? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
		: null;
	const AUTH_TOKEN_KEY = 'suaimi_auth_token';
	const AUTH_USER_KEY = 'suaimi_auth_user';
	const AUTH_SESSION_KEY = 'suaimi_auth_session';
	const BUILD_ID = '2026-07-11-r5';

	const buildBadgeEl = document.getElementById('build-badge');
	if (buildBadgeEl) {
		buildBadgeEl.textContent = `Build ${BUILD_ID} aktif`;
	}

	function parseSession(raw) {
		if (!raw) return null;
		try {
			const parsed = JSON.parse(raw);
			if (!parsed || typeof parsed !== 'object') return null;
			if (!parsed.access_token || !parsed.refresh_token) return null;
			return parsed;
		} catch {
			return null;
		}
	}

	function getSessionCandidates() {
		const localToken = localStorage.getItem(AUTH_TOKEN_KEY);
		const sessionToken = sessionStorage.getItem(AUTH_TOKEN_KEY);
		const localSession = parseSession(localStorage.getItem(AUTH_SESSION_KEY));
		const sessionSession = parseSession(sessionStorage.getItem(AUTH_SESSION_KEY));
		const candidates = [];

		if (sessionSession) candidates.push({ type: 'session', value: sessionSession, storage: sessionStorage });
		if (localSession && (!sessionSession || localSession.access_token !== sessionSession.access_token)) {
			candidates.push({ type: 'session', value: localSession, storage: localStorage });
		}
		if (sessionToken && (!sessionSession || sessionToken !== sessionSession.access_token)) {
			candidates.push({ type: 'token', value: sessionToken, storage: sessionStorage });
		}
		if (localToken && (!localSession || localToken !== localSession.access_token) && localToken !== sessionToken) {
			candidates.push({ type: 'token', value: localToken, storage: localStorage });
		}

		return candidates;
	}

	function getPreferredStorage() {
		if (localStorage.getItem(AUTH_TOKEN_KEY) || localStorage.getItem(AUTH_SESSION_KEY)) {
			return localStorage;
		}
		return sessionStorage;
	}

	function getStoredUser() {
		const localUser = localStorage.getItem(AUTH_USER_KEY);
		const sessionUser = sessionStorage.getItem(AUTH_USER_KEY);
		const raw = localUser || sessionUser;
		if (!raw) return null;
		try {
			return JSON.parse(raw);
		} catch {
			return null;
		}
	}

	function clearAuthStorage() {
		localStorage.removeItem(AUTH_TOKEN_KEY);
		localStorage.removeItem(AUTH_USER_KEY);
		localStorage.removeItem(AUTH_SESSION_KEY);
		sessionStorage.removeItem(AUTH_TOKEN_KEY);
		sessionStorage.removeItem(AUTH_USER_KEY);
		sessionStorage.removeItem(AUTH_SESSION_KEY);
	}

	function redirectUnauthorized() {
		clearAuthStorage();
		window.location.replace(`./login.html?state=unauthorized&v=${BUILD_ID}`);
	}

	async function verifyToken(accessToken) {
		if (!supabaseClient) {
			if (!window.supabase?.createClient) {
				throw new Error('Library Supabase gagal dimuat. Coba refresh halaman atau cek koneksi internet/CDN.');
			}
			throw new Error('Konfigurasi Supabase belum lengkap.');
		}

		const { data, error } = await supabaseClient.auth.getUser(accessToken);
		if (error || !data?.user) {
			throw new Error('Sesi tidak valid atau sudah berakhir');
		}

		return data.user;
	}

	async function resolveActiveSession() {
		// Prioritaskan sesi internal Supabase agar refresh token tetap bisa dipakai,
		// termasuk untuk user yang sempat login dari versi halaman lama.
		const { data: internalSessionData, error: internalSessionError } = await supabaseClient.auth.getSession();
		const internalSession = internalSessionData?.session;
		if (!internalSessionError && internalSession?.access_token) {
			try {
				const user = await verifyToken(internalSession.access_token);
				return {
					storage: getPreferredStorage(),
					token: internalSession.access_token,
					session: internalSession,
					user
				};
			} catch {
				// Lanjut ke fallback kandidat custom jika sesi internal ternyata sudah invalid.
			}
		}

		const candidates = getSessionCandidates();
		for (const candidate of candidates) {
			if (candidate.type === 'session') {
				const { data, error } = await supabaseClient.auth.refreshSession({
					refresh_token: candidate.value.refresh_token
				});

				if (!error && data?.session && data?.user) {
					return {
						storage: candidate.storage,
						token: data.session.access_token,
						session: data.session,
						user: data.user
					};
				}
			}

			const token = candidate.type === 'token' ? candidate.value : candidate.value.access_token;
			try {
				const user = await verifyToken(token);
				return {
					storage: candidate.storage,
					token,
					session: candidate.type === 'session' ? candidate.value : null,
					user
				};
			} catch {
				// Lanjut ke kandidat berikutnya.
			}
		}

		throw new Error('Sesi tidak valid atau sudah berakhir');
	}

	const sessionCandidates = getSessionCandidates();
	if (!sessionCandidates.length) {
		redirectUnauthorized();
	}

	const cattleForm = document.getElementById('cattle-form');
	const cattleTbody = document.getElementById('cattle-tbody');
	const formStatus = document.getElementById('form-status');
	const resetButton = document.getElementById('reset-button');
	const saveButton = document.getElementById('save-button');
	const reauthWrap = document.getElementById('reauth-wrap');

	function rupiah(value) {
		return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(value || 0);
	}

	function setFormStatus(message, tone) {
		if (!formStatus) return;
		formStatus.textContent = message || '';
		formStatus.classList.remove('error', 'success');
		if (tone) formStatus.classList.add(tone);
	}

	function resetForm() {
		if (!cattleForm) return;
		cattleForm.reset();
		document.getElementById('cattle-id').value = '';
		setFormStatus('Mode tambah data baru.', '');
	}

	function normalizeImagePath(rawValue) {
		const value = String(rawValue || '').trim();
		if (!value) return '';
		if (value.startsWith('http://') || value.startsWith('https://') || value.startsWith('./') || value.startsWith('../') || value.startsWith('/')) {
			return value;
		}
		if (value.includes('/')) {
			return value.toLowerCase();
		}
		return `image/${value.toLowerCase()}`;
	}

	function renderTable(items) {
		if (!cattleTbody) return;
		cattleTbody.innerHTML = '';

		if (!Array.isArray(items) || !items.length) {
			cattleTbody.innerHTML = '<tr><td colspan="7">Belum ada data sapi.</td></tr>';
			return;
		}

		for (const item of items) {
			const tr = document.createElement('tr');
			tr.innerHTML = `
				<td>${item.code}</td>
				<td>${item.name}</td>
				<td>${item.breed} (${item.gender})</td>
				<td>${item.weight_kg || item.weightKg || 0} kg</td>
				<td>${rupiah(item.price)}</td>
				<td>${item.status}</td>
				<td>
					<div class="action-buttons">
						<button class="btn btn-sm btn-ghost" data-action="edit" data-id="${item.id}">Ubah</button>
						<button class="btn btn-sm btn-danger" data-action="delete" data-id="${item.id}">Hapus</button>
					</div>
				</td>
			`;
			cattleTbody.appendChild(tr);
		}
	}

	let cachedItems = [];

	async function loadCattle() {
		try {
			const { data, error } = await supabaseClient
				.from(CATTLE_TABLE)
				.select('*')
				.order('id', { ascending: false });

			if (error) throw error;
			cachedItems = data || [];
			renderTable(cachedItems);
		} catch (error) {
			setFormStatus(error.message || 'Gagal memuat data sapi.', 'error');
		}
	}

	function fillForm(item) {
		document.getElementById('cattle-id').value = String(item.id || '');
		document.getElementById('code').value = item.code || '';
		document.getElementById('name').value = item.name || '';
		document.getElementById('breed').value = item.breed || '';
		document.getElementById('gender').value = item.gender || 'Jantan';
		document.getElementById('status').value = item.status || 'Tersedia';
		document.getElementById('weightKg').value = item.weight_kg || item.weightKg || '';
		document.getElementById('price').value = item.price || '';
		document.getElementById('imageUrl').value = item.image_url || item.imageUrl || '';
		document.getElementById('healthCondition').value = item.health_condition || item.healthCondition || '';
		setFormStatus(`Mode ubah untuk ${item.code}.`, '');
	}

	async function handleDelete(itemId) {
		if (!confirm('Hapus data sapi ini?')) return;
		try {
			const { error } = await supabaseClient
				.from(CATTLE_TABLE)
				.delete()
				.eq('id', itemId);

			if (error) throw error;
			setFormStatus('Data sapi berhasil dihapus.', 'success');
			await loadCattle();
			resetForm();
		} catch (error) {
			setFormStatus(error.message || 'Gagal menghapus data.', 'error');
		}
	}

	cattleTbody?.addEventListener('click', (event) => {
		const target = event.target;
		if (!(target instanceof HTMLButtonElement)) return;

		const itemId = Number(target.dataset.id || 0);
		if (!itemId) return;

		if (target.dataset.action === 'edit') {
			const item = cachedItems.find((entry) => Number(entry.id) === itemId);
			if (item) fillForm(item);
			return;
		}

		if (target.dataset.action === 'delete') {
			handleDelete(itemId);
		}
	});

	cattleForm?.addEventListener('submit', async (event) => {
		event.preventDefault();
		saveButton?.setAttribute('disabled', 'disabled');

		const itemId = Number(document.getElementById('cattle-id').value || 0);
		const body = {
			code: document.getElementById('code').value.trim(),
			name: document.getElementById('name').value.trim(),
			breed: document.getElementById('breed').value.trim(),
			gender: document.getElementById('gender').value,
			status: document.getElementById('status').value,
			weight_kg: Number(document.getElementById('weightKg').value || 0),
			price: Number(document.getElementById('price').value || 0),
			image_url: normalizeImagePath(document.getElementById('imageUrl').value),
			health_condition: document.getElementById('healthCondition').value.trim()
		};

		try {
			if (itemId > 0) {
				const { error } = await supabaseClient
					.from(CATTLE_TABLE)
					.update(body)
					.eq('id', itemId);

				if (error) throw error;
				setFormStatus('Data sapi berhasil diperbarui.', 'success');
			} else {
				const { error } = await supabaseClient
					.from(CATTLE_TABLE)
					.insert(body);

				if (error) throw error;
				setFormStatus('Data sapi berhasil ditambahkan.', 'success');
			}

			await loadCattle();
			resetForm();
		} catch (error) {
			setFormStatus(error.message || 'Gagal menyimpan data.', 'error');
		} finally {
			saveButton?.removeAttribute('disabled');
		}
	});

	resetButton?.addEventListener('click', () => {
		resetForm();
	});

	const user = getStoredUser();
	const userInfoEl = document.getElementById('user-info');
	if (userInfoEl) {
		const displayName = user?.name || user?.username || user?.email || user?.identifier || 'admin';
		userInfoEl.textContent = `Verifikasi sesi: ${displayName}...`;
	}

	(async () => {
		try {
			const active = await resolveActiveSession();
			if (active.storage === localStorage) {
				sessionStorage.removeItem(AUTH_TOKEN_KEY);
				sessionStorage.removeItem(AUTH_USER_KEY);
				sessionStorage.removeItem(AUTH_SESSION_KEY);
			} else {
				localStorage.removeItem(AUTH_TOKEN_KEY);
				localStorage.removeItem(AUTH_USER_KEY);
				localStorage.removeItem(AUTH_SESSION_KEY);
			}

			active.storage.setItem(AUTH_TOKEN_KEY, active.token || '');
			active.storage.setItem(AUTH_USER_KEY, JSON.stringify(active.user));
			if (active.session?.refresh_token) {
				active.storage.setItem(AUTH_SESSION_KEY, JSON.stringify(active.session));
			}

			const activeUser = active.user || getStoredUser();
			const displayName = activeUser?.name || activeUser?.username || activeUser?.email || activeUser?.identifier || 'admin';
			if (userInfoEl) {
				userInfoEl.textContent = `Login sebagai: ${displayName}`;
			}

			resetForm();
			loadCattle();
		} catch (error) {
			if (userInfoEl) {
				userInfoEl.textContent = 'Sesi tidak dapat diverifikasi sekarang. Dashboard tetap dibuka, tetapi jika gagal simpan data silakan login ulang.';
				userInfoEl.classList.add('error');
			}
			if (reauthWrap) {
				reauthWrap.style.display = 'block';
			}
			console.error('Verifikasi token gagal:', error);
			setFormStatus('Autentikasi sedang bermasalah. Coba login ulang jika aksi simpan/hapus gagal.', 'error');
			await loadCattle();
		}
	})();

	const logoutButton = document.getElementById('logout-button');
	logoutButton?.addEventListener('click', async () => {
		try {
			if (supabaseClient) {
				await supabaseClient.auth.signOut();
			}
		} catch (error) {
			console.warn('Logout Supabase gagal, lanjut bersihkan sesi lokal.', error);
		} finally {
			clearAuthStorage();
			window.location.href = './login.html?state=logged_out';
		}
	});
	</script>
</body>
</html>
