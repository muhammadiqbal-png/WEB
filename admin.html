<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Dashboard admin Suaimi Livestock.">
	<meta name="theme-color" content="#9c4f2f">
	<title>Dashboard Admin - Suaimi Livestock</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700;9..144,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
	<style>
		:root {
			--background: #f6f1e9;
			--surface: #fffaf0;
			--foreground: #18130f;
			--primary: #9c4f2f;
			--primary-dark: #6f3420;
			--muted-foreground: #6b6258;
			--border: rgba(24, 19, 15, 0.14);
		}

		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: "Hanken Grotesk", Arial, sans-serif;
			color: var(--foreground);
			background:
				radial-gradient(circle at 12% 8%, rgba(156, 79, 47, 0.16), transparent 32%),
				radial-gradient(circle at 95% 90%, rgba(111, 52, 32, 0.14), transparent 38%),
				var(--background);
		}

		a { color: inherit; text-decoration: none; }
		.container { width: min(1180px, calc(100% - 48px)); margin: 0 auto; }

		.navbar {
			position: sticky;
			top: 0;
			z-index: 40;
			background: rgba(246, 241, 233, .92);
			border-bottom: 1px solid var(--border);
			backdrop-filter: blur(12px);
		}

		.nav-inner {
			height: 76px;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 24px;
		}

		.brand {
			font-family: "Fraunces", Georgia, serif;
			font-size: 28px;
			font-weight: 800;
		}

		.brand span { color: var(--primary); }

		.nav-actions {
			display: inline-flex;
			align-items: center;
			gap: 10px;
		}

		.btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 10px 16px;
			font-size: 13px;
			font-weight: 800;
			letter-spacing: .04em;
			text-transform: uppercase;
			border-radius: 2px;
			border: 1px solid var(--primary);
			background: var(--primary);
			color: var(--surface);
			cursor: pointer;
			transition: background .2s ease, border-color .2s ease;
		}

		.btn:hover { background: var(--primary-dark); border-color: var(--primary-dark); }

		.btn-ghost {
			background: transparent;
			color: var(--primary);
		}

		.main {
			padding: 64px 0 80px;
		}

		.panel {
			border: 1px solid var(--border);
			background: rgba(255, 250, 240, .72);
			padding: 34px;
		}

		.eyebrow {
			margin: 0 0 14px;
			color: var(--primary);
			font-size: 12px;
			font-weight: 800;
			letter-spacing: .32em;
			text-transform: uppercase;
		}

		h1 {
			margin: 0;
			font-family: "Fraunces", Georgia, serif;
			font-size: clamp(34px, 4vw, 58px);
			line-height: .98;
		}

		.subtitle {
			margin: 14px 0 0;
			font-size: 17px;
			line-height: 1.7;
			color: var(--muted-foreground);
			max-width: 760px;
		}

		.grid {
			margin-top: 26px;
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 16px;
		}

		.card {
			border: 1px solid var(--border);
			background: var(--surface);
			padding: 20px;
		}

		.card h2 {
			margin: 0 0 6px;
			font-family: "Fraunces", Georgia, serif;
			font-size: 28px;
		}

		.card p {
			margin: 0;
			color: var(--muted-foreground);
			line-height: 1.6;
		}

		.user-info {
			margin-top: 24px;
			font-size: 14px;
			color: var(--muted-foreground);
		}

		.dashboard-grid {
			margin-top: 30px;
			display: grid;
			grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
			gap: 18px;
		}

		.management-box {
			border: 1px solid var(--border);
			background: var(--surface);
			padding: 20px;
		}

		.management-box h2 {
			margin: 0 0 16px;
			font-family: "Fraunces", Georgia, serif;
			font-size: 30px;
		}

		.form-grid {
			display: grid;
			gap: 12px;
		}

		.field {
			display: grid;
			gap: 6px;
		}

		.field label {
			font-size: 12px;
			font-weight: 700;
			letter-spacing: .04em;
			text-transform: uppercase;
			color: var(--muted-foreground);
		}

		.field input,
		.field select {
			height: 42px;
			padding: 0 12px;
			border: 1px solid var(--border);
			background: #fff;
			color: var(--foreground);
		}

		.form-row {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 10px;
		}

		.form-actions {
			display: flex;
			gap: 8px;
			margin-top: 4px;
		}

		.btn-danger {
			border-color: #9f2f2f;
			background: #9f2f2f;
		}

		.btn-danger:hover {
			border-color: #7d2424;
			background: #7d2424;
		}

		.status-text {
			min-height: 20px;
			margin-top: 10px;
			font-size: 14px;
			color: var(--muted-foreground);
		}

		.status-text.error { color: #9f2f2f; }
		.status-text.success { color: #2e6b3f; }

		.table-wrap {
			overflow-x: auto;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			font-size: 14px;
		}

		thead th {
			text-align: left;
			padding: 10px 8px;
			border-bottom: 1px solid var(--border);
			color: var(--muted-foreground);
			font-size: 12px;
			letter-spacing: .04em;
			text-transform: uppercase;
		}

		tbody td {
			padding: 11px 8px;
			border-bottom: 1px solid var(--border);
			vertical-align: top;
		}

		.action-buttons {
			display: inline-flex;
			gap: 6px;
		}

		.btn-sm {
			padding: 6px 10px;
			font-size: 11px;
		}

		.user-info.error { color: #9f2f2f; }

		@media (max-width: 900px) {
			.grid { grid-template-columns: 1fr; }
			.dashboard-grid { grid-template-columns: 1fr; }
			.form-row { grid-template-columns: 1fr; }
			.panel { padding: 24px; }
		}
	</style>
</head>
<body>
	<nav class="navbar">
		<div class="container nav-inner">
			<a href="./index.html" class="brand">suaimi<span>.</span></a>
			<div class="nav-actions">
				<a href="./katalog.html" class="btn btn-ghost">Katalog</a>
				<button type="button" class="btn" id="logout-button">Logout</button>
			</div>
		</div>
	</nav>

	<main class="main">
		<section class="container panel" aria-label="Dashboard admin">
			<p class="eyebrow">Area Terproteksi</p>
			<h1>Dashboard Admin</h1>
			<p class="subtitle">Kelola katalog sapi langsung dari dashboard. Data tersimpan ke database SQLite backend.</p>
			<div class="dashboard-grid">
				<section class="management-box" aria-label="Form data sapi">
					<h2>Form Sapi</h2>
					<form id="cattle-form" class="form-grid">
						<input type="hidden" id="cattle-id">
						<div class="field">
							<label for="code">Kode</label>
							<input id="code" name="code" type="text" placeholder="SP-010" required>
						</div>
						<div class="field">
							<label for="name">Nama</label>
							<input id="name" name="name" type="text" placeholder="Sapi Bali Jantan" required>
						</div>
						<div class="field">
							<label for="breed">Ras</label>
							<input id="breed" name="breed" type="text" placeholder="Sapi Bali" required>
						</div>
						<div class="form-row">
							<div class="field">
								<label for="gender">Kelamin</label>
								<select id="gender" name="gender" required>
									<option value="Jantan">Jantan</option>
									<option value="Betina">Betina</option>
								</select>
							</div>
							<div class="field">
								<label for="status">Status</label>
								<select id="status" name="status" required>
									<option value="Tersedia">Tersedia</option>
									<option value="Terjual">Terjual</option>
									<option value="Booking">Booking</option>
								</select>
							</div>
						</div>
						<div class="form-row">
							<div class="field">
								<label for="weightKg">Berat (kg)</label>
								<input id="weightKg" name="weightKg" type="number" min="1" required>
							</div>
							<div class="field">
								<label for="price">Harga</label>
								<input id="price" name="price" type="number" min="1" required>
							</div>
						</div>
						<div class="field">
							<label for="imageUrl">URL Gambar</label>
							<input id="imageUrl" name="imageUrl" type="text" placeholder="image/sapi10.jpg">
						</div>
						<div class="form-actions">
							<button type="submit" class="btn" id="save-button">Simpan</button>
							<button type="button" class="btn btn-ghost" id="reset-button">Reset</button>
						</div>
					</form>
					<p class="status-text" id="form-status"></p>
				</section>

				<section class="management-box" aria-label="Tabel katalog sapi">
					<h2>Data Katalog</h2>
					<div class="table-wrap">
						<table>
							<thead>
								<tr>
									<th>Kode</th>
									<th>Nama</th>
									<th>Ras</th>
									<th>Berat</th>
									<th>Harga</th>
									<th>Status</th>
									<th>Aksi</th>
								</tr>
							</thead>
							<tbody id="cattle-tbody"></tbody>
						</table>
					</div>
				</section>
			</div>
			<p class="user-info" id="user-info">Memuat data akun...</p>
		</section>
	</main>

	<script src="./auth-config.js"></script>
	<script>
	const BACKEND_BASE_URL = window.AUTH_CONFIG?.BACKEND_BASE_URL || 'http://localhost:3000';
	const VERIFY_ENDPOINT = window.AUTH_CONFIG?.VERIFY_ENDPOINT || '/api/auth/me';
	const LOGOUT_ENDPOINT = window.AUTH_CONFIG?.LOGOUT_ENDPOINT || '/api/auth/logout';
	const CATTLE_LIST_ENDPOINT = window.AUTH_CONFIG?.CATTLE_LIST_ENDPOINT || '/api/cattle';
	const CATTLE_ADMIN_ENDPOINT = window.AUTH_CONFIG?.CATTLE_ADMIN_ENDPOINT || '/api/admin/cattle';
	const AUTH_TOKEN_KEY = 'suaimi_auth_token';
	const AUTH_USER_KEY = 'suaimi_auth_user';

	function getStoredToken() {
		return localStorage.getItem(AUTH_TOKEN_KEY) || sessionStorage.getItem(AUTH_TOKEN_KEY);
	}

	function getStoredUser() {
		const localUser = localStorage.getItem(AUTH_USER_KEY);
		const sessionUser = sessionStorage.getItem(AUTH_USER_KEY);
		const raw = localUser || sessionUser;
		if (!raw) return null;
		try {
			return JSON.parse(raw);
		} catch {
			return null;
		}
	}

	function clearAuthStorage() {
		localStorage.removeItem(AUTH_TOKEN_KEY);
		localStorage.removeItem(AUTH_USER_KEY);
		sessionStorage.removeItem(AUTH_TOKEN_KEY);
		sessionStorage.removeItem(AUTH_USER_KEY);
	}

	function redirectUnauthorized() {
		clearAuthStorage();
		window.location.href = './login.html?state=unauthorized';
	}

	async function verifyTokenWithBackend(token) {
		const response = await fetch(`${BACKEND_BASE_URL}${VERIFY_ENDPOINT}`, {
			method: 'GET',
			headers: {
				'Accept': 'application/json',
				'Authorization': `Bearer ${token}`
			}
		});

		if (!response.ok) {
			throw new Error('Token invalid atau sesi berakhir');
		}

		try {
			return await response.json();
		} catch {
			return null;
		}
	}

	const token = getStoredToken();
	if (!token) {
		redirectUnauthorized();
	}

	const cattleForm = document.getElementById('cattle-form');
	const cattleTbody = document.getElementById('cattle-tbody');
	const formStatus = document.getElementById('form-status');
	const resetButton = document.getElementById('reset-button');
	const saveButton = document.getElementById('save-button');

	function rupiah(value) {
		return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(value || 0);
	}

	function setFormStatus(message, tone) {
		if (!formStatus) return;
		formStatus.textContent = message || '';
		formStatus.classList.remove('error', 'success');
		if (tone) formStatus.classList.add(tone);
	}

	function resetForm() {
		if (!cattleForm) return;
		cattleForm.reset();
		document.getElementById('cattle-id').value = '';
		setFormStatus('Mode tambah data baru.', '');
	}

	async function fetchWithAuth(url, options) {
		const response = await fetch(url, {
			...options,
			headers: {
				'Accept': 'application/json',
				'Content-Type': 'application/json',
				'Authorization': `Bearer ${token}`,
				...(options?.headers || {})
			}
		});

		if (response.status === 401) {
			redirectUnauthorized();
			throw new Error('Unauthorized');
		}

		let payload = null;
		try {
			payload = await response.json();
		} catch {
			payload = null;
		}

		if (!response.ok) {
			throw new Error(payload?.message || 'Request gagal');
		}

		return payload;
	}

	function renderTable(items) {
		if (!cattleTbody) return;
		cattleTbody.innerHTML = '';

		if (!Array.isArray(items) || !items.length) {
			cattleTbody.innerHTML = '<tr><td colspan="7">Belum ada data sapi.</td></tr>';
			return;
		}

		for (const item of items) {
			const tr = document.createElement('tr');
			tr.innerHTML = `
				<td>${item.code}</td>
				<td>${item.name}</td>
				<td>${item.breed} (${item.gender})</td>
				<td>${item.weight_kg} kg</td>
				<td>${rupiah(item.price)}</td>
				<td>${item.status}</td>
				<td>
					<div class="action-buttons">
						<button class="btn btn-sm btn-ghost" data-action="edit" data-id="${item.id}">Ubah</button>
						<button class="btn btn-sm btn-danger" data-action="delete" data-id="${item.id}">Hapus</button>
					</div>
				</td>
			`;
			cattleTbody.appendChild(tr);
		}
	}

	let cachedItems = [];

	async function loadCattle() {
		try {
			const payload = await fetchWithAuth(`${BACKEND_BASE_URL}${CATTLE_LIST_ENDPOINT}`);
			cachedItems = payload?.items || [];
			renderTable(cachedItems);
		} catch (error) {
			setFormStatus(error.message || 'Gagal memuat data sapi.', 'error');
		}
	}

	function fillForm(item) {
		document.getElementById('cattle-id').value = String(item.id || '');
		document.getElementById('code').value = item.code || '';
		document.getElementById('name').value = item.name || '';
		document.getElementById('breed').value = item.breed || '';
		document.getElementById('gender').value = item.gender || 'Jantan';
		document.getElementById('status').value = item.status || 'Tersedia';
		document.getElementById('weightKg').value = item.weight_kg || '';
		document.getElementById('price').value = item.price || '';
		document.getElementById('imageUrl').value = item.image_url || '';
		setFormStatus(`Mode ubah untuk ${item.code}.`, '');
	}

	async function handleDelete(itemId) {
		if (!confirm('Hapus data sapi ini?')) return;
		try {
			await fetchWithAuth(`${BACKEND_BASE_URL}${CATTLE_ADMIN_ENDPOINT}/${itemId}`, {
				method: 'DELETE'
			});
			setFormStatus('Data sapi berhasil dihapus.', 'success');
			await loadCattle();
			resetForm();
		} catch (error) {
			setFormStatus(error.message || 'Gagal menghapus data.', 'error');
		}
	}

	cattleTbody?.addEventListener('click', (event) => {
		const target = event.target;
		if (!(target instanceof HTMLButtonElement)) return;

		const itemId = Number(target.dataset.id || 0);
		if (!itemId) return;

		if (target.dataset.action === 'edit') {
			const item = cachedItems.find((entry) => Number(entry.id) === itemId);
			if (item) fillForm(item);
			return;
		}

		if (target.dataset.action === 'delete') {
			handleDelete(itemId);
		}
	});

	cattleForm?.addEventListener('submit', async (event) => {
		event.preventDefault();
		saveButton?.setAttribute('disabled', 'disabled');

		const itemId = Number(document.getElementById('cattle-id').value || 0);
		const body = {
			code: document.getElementById('code').value.trim(),
			name: document.getElementById('name').value.trim(),
			breed: document.getElementById('breed').value.trim(),
			gender: document.getElementById('gender').value,
			status: document.getElementById('status').value,
			weightKg: Number(document.getElementById('weightKg').value || 0),
			price: Number(document.getElementById('price').value || 0),
			imageUrl: document.getElementById('imageUrl').value.trim()
		};

		try {
			if (itemId > 0) {
				await fetchWithAuth(`${BACKEND_BASE_URL}${CATTLE_ADMIN_ENDPOINT}/${itemId}`, {
					method: 'PUT',
					body: JSON.stringify(body)
				});
				setFormStatus('Data sapi berhasil diperbarui.', 'success');
			} else {
				await fetchWithAuth(`${BACKEND_BASE_URL}${CATTLE_ADMIN_ENDPOINT}`, {
					method: 'POST',
					body: JSON.stringify(body)
				});
				setFormStatus('Data sapi berhasil ditambahkan.', 'success');
			}

			await loadCattle();
			resetForm();
		} catch (error) {
			setFormStatus(error.message || 'Gagal menyimpan data.', 'error');
		} finally {
			saveButton?.removeAttribute('disabled');
		}
	});

	resetButton?.addEventListener('click', () => {
		resetForm();
	});

	const user = getStoredUser();
	const userInfoEl = document.getElementById('user-info');
	if (userInfoEl) {
		const displayName = user?.name || user?.username || user?.email || user?.identifier || 'admin';
		userInfoEl.textContent = `Verifikasi sesi: ${displayName}...`;
	}

	(async () => {
		try {
			const payload = await verifyTokenWithBackend(token);
			const backendUser = payload?.user || payload?.data?.user || payload?.data || null;
			if (backendUser) {
				const storage = localStorage.getItem(AUTH_TOKEN_KEY) ? localStorage : sessionStorage;
				storage.setItem(AUTH_USER_KEY, JSON.stringify(backendUser));
			}

			const activeUser = backendUser || getStoredUser();
			const displayName = activeUser?.name || activeUser?.username || activeUser?.email || activeUser?.identifier || 'admin';
			if (userInfoEl) {
				userInfoEl.textContent = `Login sebagai: ${displayName}`;
			}

			resetForm();
			loadCattle();
		} catch (error) {
			if (userInfoEl) {
				userInfoEl.textContent = 'Sesi tidak valid atau backend tidak bisa diakses. Mengalihkan ke login...';
				userInfoEl.classList.add('error');
			}
			console.error('Verifikasi token gagal:', error);
			setTimeout(() => {
				redirectUnauthorized();
			}, 1000);
		}
	})();

	const logoutButton = document.getElementById('logout-button');
	logoutButton?.addEventListener('click', async () => {
		try {
			if (token) {
				await fetch(`${BACKEND_BASE_URL}${LOGOUT_ENDPOINT}`, {
					method: 'POST',
					headers: {
						'Accept': 'application/json',
						'Authorization': `Bearer ${token}`
					}
				});
			}
		} catch (error) {
			console.warn('Logout backend gagal, lanjut bersihkan sesi lokal.', error);
		} finally {
			clearAuthStorage();
			window.location.href = './login.html?state=logged_out';
		}
	});
	</script>
</body>
</html>
