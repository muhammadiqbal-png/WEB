<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Suaimi Livestock</title>
  <style>
    :root {
      --bg: #f6f1e9;
      --surface: #fffaf0;
      --text: #18130f;
      --muted: #6b6258;
      --primary: #9c4f2f;
      --primary-dark: #6f3420;
      --border: rgba(24, 19, 15, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(156, 79, 47, 0.14), transparent 42%),
        radial-gradient(circle at 80% 80%, rgba(24, 19, 15, 0.08), transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 24px;
    }

    .card {
      width: min(440px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 16px 40px rgba(24, 19, 15, 0.08);
      padding: 30px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      padding: 12px;
      font-size: 15px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fffaf0;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 12px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    button:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    .error {
      margin: 0 0 14px;
      color: #b42318;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Login Admin</h1>
    <p>Masuk untuk mengelola data sapi, status, dan konten katalog.</p>

    <form id="login-form">
      <div class="error" id="error-text"></div>

      <label for="username">Username</label>
      <input id="username" name="username" required autocomplete="username" />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" />

      <button type="submit">Masuk</button>
    </form>

    <p class="hint">Default demo: username <strong>admin</strong> dan password <strong>admin123</strong>.</p>
  </main>

  <script>
    if (window.location.protocol === "file:") {
      window.location.href = "http://localhost/WEB/admin-login.html";
    }

    const form = document.getElementById("login-form");
    const errorText = document.getElementById("error-text");

    async function tryLogin(payload) {
      const candidates = [
        "./api/auth_login.php",
        "/WEB/api/auth_login.php",
        "http://localhost/WEB/api/auth_login.php",
      ];

      for (const url of candidates) {
        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            credentials: "include",
          });

          let result = {};
          try {
            result = await response.json();
          } catch (parseError) {
            result = {};
          }

          if (response.ok) {
            return { ok: true, result };
          }

          if (response.status === 400 || response.status === 401) {
            return { ok: false, message: result.message || "Login gagal." };
          }
        } catch (networkError) {
          // Try next candidate URL.
        }
      }

      return {
        ok: false,
        message: "Tidak bisa terhubung ke server PHP. Buka lewat http://localhost/WEB/admin-login.html dan pastikan Apache + MySQL aktif.",
      };
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorText.textContent = "";

      const formData = new FormData(form);
      const payload = {
        username: formData.get("username"),
        password: formData.get("password"),
      };

      const loginResult = await tryLogin(payload);
      if (!loginResult.ok) {
        errorText.textContent = loginResult.message;
        return;
      }

      window.location.href = "./admin-dashboard.html";
    });
  </script>
</body>
</html>
