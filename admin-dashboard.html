<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Suaimi Livestock</title>
  <style>
    :root {
      --bg: #f6f1e9;
      --surface: #fffaf0;
      --text: #18130f;
      --muted: #6b6258;
      --primary: #9c4f2f;
      --primary-dark: #6f3420;
      --border: rgba(24, 19, 15, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(1100px, calc(100% - 32px));
      margin: 26px auto 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 30px;
    }

    .topbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 10px 14px;
      cursor: pointer;
    }

    .btn-primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fffaf0;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 18px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .grid .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--muted);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      padding: 10px;
      font-size: 14px;
      background: #fff;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      text-align: left;
      padding: 10px 8px;
      vertical-align: top;
    }

    th {
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      margin-top: 8px;
      min-height: 18px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }

      table,
      thead,
      tbody,
      th,
      td,
      tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        border: 1px solid var(--border);
        margin-bottom: 12px;
        background: #fff;
      }

      td {
        border: 0;
        border-bottom: 1px solid var(--border);
      }

      td:last-child {
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Dashboard Admin</h1>
      <div class="topbar-actions">
        <button class="btn" id="refresh-btn" type="button">Refresh</button>
        <button class="btn btn-primary" id="logout-btn" type="button">Logout</button>
      </div>
    </div>

    <section class="panel">
      <h2>Tambah Data Sapi</h2>
      <form id="sapi-form">
        <div class="grid">
          <div>
            <label for="code">Kode</label>
            <input id="code" name="code" required />
          </div>
          <div>
            <label for="jenis">Jenis</label>
            <input id="jenis" name="jenis" required />
          </div>
          <div>
            <label for="kelamin">Kelamin</label>
            <input id="kelamin" name="kelamin" required />
          </div>
          <div>
            <label for="umur">Umur</label>
            <input id="umur" name="umur" required />
          </div>
          <div>
            <label for="bobot">Bobot</label>
            <input id="bobot" name="bobot" required />
          </div>
          <div>
            <label for="harga">Harga</label>
            <input id="harga" name="harga" required />
          </div>
          <div>
            <label for="warna">Warna</label>
            <input id="warna" name="warna" required />
          </div>
          <div>
            <label for="status">Status</label>
            <input id="status" name="status" required value="Tersedia" />
          </div>
          <div>
            <label for="image_path">Path Gambar</label>
            <input id="image_path" name="image_path" placeholder="image/sapi1.jpg" />
          </div>
          <div>
            <label for="detail_file">File Detail</label>
            <input id="detail_file" name="detail_file" placeholder="detailsapi1.html" />
          </div>
          <div class="full">
            <label for="kondisi_kesehatan">Kondisi Kesehatan</label>
            <textarea id="kondisi_kesehatan" name="kondisi_kesehatan" required></textarea>
          </div>
        </div>

        <div style="margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap;">
          <button class="btn btn-primary" type="submit">Simpan</button>
          <button class="btn" type="reset">Reset</button>
        </div>
        <div class="status" id="form-status"></div>
      </form>
    </section>

    <section class="panel">
      <h2>Ganti Password Admin</h2>
      <form id="password-form">
        <div class="grid">
          <div>
            <label for="current_password">Password Lama</label>
            <input id="current_password" name="current_password" type="password" required autocomplete="current-password" />
          </div>
          <div>
            <label for="new_password">Password Baru</label>
            <input id="new_password" name="new_password" type="password" required minlength="8" autocomplete="new-password" />
          </div>
          <div>
            <label for="confirm_password">Konfirmasi Password Baru</label>
            <input id="confirm_password" name="confirm_password" type="password" required minlength="8" autocomplete="new-password" />
          </div>
        </div>

        <div style="margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap;">
          <button class="btn btn-primary" type="submit">Perbarui Password</button>
          <button class="btn" type="reset">Reset</button>
        </div>
        <div class="status" id="password-status"></div>
      </form>
    </section>

    <section class="panel">
      <h2>Data Sapi</h2>
      <p class="muted">Tabel ini berasal dari database backend.</p>
      <div id="table-wrap"></div>
    </section>
  </div>

  <script>
    const tableWrap = document.getElementById("table-wrap");
    const form = document.getElementById("sapi-form");
    const formStatus = document.getElementById("form-status");
    const passwordForm = document.getElementById("password-form");
    const passwordStatus = document.getElementById("password-status");
    const refreshBtn = document.getElementById("refresh-btn");
    const logoutBtn = document.getElementById("logout-btn");

    async function apiFetch(path, options = {}) {
      return fetch(path, {
        ...options,
        credentials: "include",
      });
    }

    async function checkAuth() {
      const response = await apiFetch("./api/auth_me.php");
      if (!response.ok) {
        window.location.href = "./admin-login.html";
      }
    }

    function rowActions(id) {
      return `
        <button class="btn" onclick="deleteSapi(${id})" type="button">Hapus</button>
      `;
    }

    function renderTable(data) {
      if (!data.length) {
        tableWrap.innerHTML = "<p class='muted'>Belum ada data sapi di database.</p>";
        return;
      }

      const rows = data
        .map(
          (item) => `
            <tr>
              <td>${item.code}</td>
              <td>${item.jenis}</td>
              <td>${item.kelamin}</td>
              <td>${item.umur}</td>
              <td>${item.bobot}</td>
              <td>${item.harga}</td>
              <td>${item.status}</td>
              <td>${rowActions(item.id)}</td>
            </tr>
          `
        )
        .join("");

      tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Kode</th>
              <th>Jenis</th>
              <th>Kelamin</th>
              <th>Umur</th>
              <th>Bobot</th>
              <th>Harga</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function loadSapi() {
      const response = await apiFetch("./api/sapi_list.php");
      if (!response.ok) {
        tableWrap.innerHTML = "<p class='muted'>Gagal memuat data.</p>";
        return;
      }

      const data = await response.json();
      renderTable(data);
    }

    async function deleteSapi(id) {
      const ok = window.confirm("Hapus data ini?");
      if (!ok) return;

      const response = await apiFetch("./api/sapi_delete.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id }),
      });
      if (!response.ok) {
        window.alert("Gagal menghapus data.");
        return;
      }

      await loadSapi();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      formStatus.textContent = "";

      const payload = Object.fromEntries(new FormData(form).entries());
      const response = await apiFetch("./api/sapi_create.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      const result = await response.json();
      if (!response.ok) {
        formStatus.textContent = result.message || "Gagal menyimpan data.";
        return;
      }

      formStatus.textContent = `Data ${result.code} berhasil ditambahkan.`;
      form.reset();
      await loadSapi();
    });

    passwordForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      passwordStatus.textContent = "";

      const payload = Object.fromEntries(new FormData(passwordForm).entries());

      const response = await apiFetch("./api/auth_change_password.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      const result = await response.json();
      if (!response.ok) {
        passwordStatus.textContent = result.message || "Gagal memperbarui password.";
        return;
      }

      passwordStatus.textContent = result.message || "Password berhasil diperbarui.";
      passwordForm.reset();
    });

    refreshBtn.addEventListener("click", loadSapi);

    logoutBtn.addEventListener("click", async () => {
      await apiFetch("./api/auth_logout.php", { method: "POST" });
      window.location.href = "./admin-login.html";
    });

    window.deleteSapi = deleteSapi;

    (async () => {
      await checkAuth();
      await loadSapi();
    })();
  </script>
</body>
</html>
